server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:SmartIELTS}

  mvc:
    servlet:
      path: ${SPRING_MVC_SERVLET_PATH:/api}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}

  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:100MB}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  ttl: ${JWT_TTL:7200000}
  refresh-interval: ${JWT_REFRESH_INTERVAL:900000}

mybatis:
  mapper-locations: ${MYBATIS_MAPPER_LOCATIONS:classpath*:mapper/**/*.xml}
  type-aliases-package: ${MYBATIS_TYPE_ALIASES_PACKAGE:com.andrew.smartielts.dashboard.domain.vo}
  configuration:
    map-underscore-to-camel-case: ${MYBATIS_MAP_UNDERSCORE_TO_CAMEL_CASE:true}

knife4j:
  enable: ${KNIFE4J_ENABLE:true}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT}
    region: ${ALIYUN_OSS_REGION}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    buckets:
      writing-question:
        bucket-name: ${ALIYUN_OSS_BUCKET_WRITING_QUESTION}
        domain: ${ALIYUN_OSS_DOMAIN_WRITING_QUESTION}
      writing-record:
        bucket-name: ${ALIYUN_OSS_BUCKET_WRITING_RECORD}
        domain: ${ALIYUN_OSS_DOMAIN_WRITING_RECORD}
      listening-audio:
        bucket-name: ${ALIYUN_OSS_BUCKET_LISTENING_AUDIO}
        domain: ${ALIYUN_OSS_DOMAIN_LISTENING_AUDIO}
      speaking-audio:
        bucket-name: ${ALIYUN_OSS_BUCKET_SPEAKING_AUDIO}
        domain: ${ALIYUN_OSS_DOMAIN_SPEAKING_AUDIO}
      question-group-image:
        bucket-name: ${ALIYUN_OSS_BUCKET_QUESTION_GROUP_IMAGE}
        domain: ${ALIYUN_OSS_DOMAIN_QUESTION_GROUP_IMAGE}
      user-profile-picture:
        bucket-name: ${ALIYUN_OSS_BUCKET_USER_PROFILE_PICTURE}
        domain: ${ALIYUN_OSS_DOMAIN_USER_PROFILE_PICTURE}

  ocr:
    access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_OCR_ENDPOINT:ocr-api.cn-hangzhou.aliyuncs.com}

  dashboard:
    intent:
      llm:
        base-url: ${ALIYUN_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        api-key: ${ALIYUN_AI_API_KEY:}
        model: ${WRITING_SCORE_AI_MODEL:qwen3.6-plus}
        connect-timeout-ms: 100000000
        read-timeout-ms: 30000000
    listening-asr:
      enabled: ${ALIYUN_DASHBOARD_LISTENING_ASR_ENABLED:true}

  writing-score-ai:
    model: ${WRITING_SCORE_AI_MODEL:qwen3.6-plus}
    base-url: ${ALIYUN_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${ALIYUN_AI_API_KEY:}

  speaking-score-ai:
    base-url: ${ALIYUN_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${ALIYUN_AI_API_KEY:}

    per-question-model: ${SPEAKING_SCORE_AI_MODEL:qwen3-omni-flash}
    final-model: ${SPEAKING_SCORE_AI_MODEL:qwen3.6-plus}

  bailian:
    asr:
      endpoint: https://dashscope.aliyuncs.com/api/v1/services/audio/asr/transcription
      api-key: ${ALIYUN_AI_API_KEY:}
      model: qwen3-asr-flash
      region: cn-beijing

did:
  base-url: ${DID_BASE_URL:https://api.d-id.com}
  api-key: ${DID_API_KEY:}
  webhook-url: ${DID_WEBHOOK_URL:http://localhost:8080/api/speaking/webhook/end}
  presenter-id: ${DID_PRESENTER_ID:v2_agt_017IbrpB}
  voice-id: ${DID_VOICE_ID:en-US-JennyNeural}

app:
  security:
    require-https-webhook: false
